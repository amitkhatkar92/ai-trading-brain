version: '3.9'

services:
  ai-trading-brain:
    build: .
    container_name: ai-trading-brain
    restart: always
    
    # Mounted volumes for persistent data
    volumes:
      # Trade records, logs, databases
      - ./data:/app/data
      
      # Optional: mount .env for secrets (never commit to git)
      - .env:/app/.env:ro
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/London  # EU timezone
    
    # Resource limits
    mem_limit: 2g
    cpus: '1.0'
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    
    # Network
    networks:
      - trading-network

  # Optional: Monitoring/Dashboard container
  streamlit-dashboard:
    build: .
    container_name: trading-dashboard
    restart: always
    
    command: streamlit run control_tower/dashboard_app.py --server.port=8501 --server.address=0.0.0.0
    
    volumes:
      - ./data:/app/data:ro
      - .env:/app/.env:ro
      - ./control_tower:/app/control_tower:ro

    
    ports:
      - "8501:8501"  # Streamlit dashboard
    
    mem_limit: 1g
    cpus: '0.5'
    
    networks:
      - trading-network
    
    depends_on:
      - ai-trading-brain

networks:
  trading-network:
    driver: bridge

volumes:
  trading_data:
    driver: local
