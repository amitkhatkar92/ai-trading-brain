name: Deploy Trading Brain to VPS

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-to-vps:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /root/ai-trading-brain
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt 2>&1 | tail -5
            # Ensure service file is installed (idempotent)
            cp scripts/trading-brain-schedule.service /etc/systemd/system/ 2>/dev/null || true
            systemctl daemon-reload
            systemctl enable trading-brain-schedule
            systemctl restart trading-brain-schedule
            # Restart dashboard container so it picks up latest dashboard_app.py
            docker restart trading-dashboard 2>/dev/null || true
            sleep 2
            systemctl status trading-brain-schedule | head -5
            echo "✅ Deployment complete"

